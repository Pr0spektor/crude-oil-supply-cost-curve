name: ci
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python src/validate.py
      - run: pytest -q
      - run: python tests/test_no_personal_data.py
      - run: python src/analysis.py
      - run: python src/strip_meta.py
      - run: python src/build_workbook.py

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: r-lib/actions/setup-r@v2
      - run: Rscript r/costcurve.R

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node js/costcurve.test.js
